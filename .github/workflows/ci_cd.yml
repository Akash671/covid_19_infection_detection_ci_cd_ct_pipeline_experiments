name: Model Training and Artifact Update Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train_and_update_model:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          lfs: true # Added to handle your .pkl model artifacts

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r training/requirements.txt
          pip install -r api/requirements.txt
          pip install -r ui/requirements.txt
          pip install pytest

      - name: Run automated tests
        run: |
          echo "Running automated tests..."
          pytest -vv

      - name: Run training and commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          python -m training.train
          
          git add model_artifacts/latest_model.pkl
          git add api/model.pkl

          # IMPORTANT: Removed [skip ci] so Hugging Face sees the update
          if git status --porcelain | grep -q 'model_artifacts/' || git status --porcelain | grep -q 'api/'; then
            git commit -m "CI/CD: Updated model via training pipeline"
            git push
          else
            echo "No changes in tracked artifacts. Skipping commit."
          fi

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Specific URL for your Akash671 Space
          git push --force https://Akash671:$HF_TOKEN@huggingface.co/spaces/Akash671/covid_19_infection_detection_ci_cd_ct_pipeline_experiments main
